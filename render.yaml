services:
  # 1. Consolidated App (Backend serving Frontend)
  - type: web
    name: socialflow-saas
    runtime: node
    plan: free
    # 1. Install all deps (including types) & build frontend
    # 2. Go to backend, install all deps & run migrations
    # 3. Build backend
    buildCommand: npm install --include=dev && npm run build && cd backend && npm install --include=dev && npx prisma migrate deploy && npm run build
    startCommand: node backend/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: socialflow-cache
          property: connectionString
      # Social API Keys (To be filled in Render UI)
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        value: us-east-1
      # Production URLs
      - key: BACKEND_URL
        sync: false # Set to your Render backend URL (e.g., https://app-name.onrender.com)
      - key: FRONTEND_URL
        sync: false # Usually the same as BACKEND_URL in consolidated mode
      
      # Security
      - key: ENCRYPTION_KEY
        sync: false # Generate a random 32-character string for token encryption
      - key: CLERK_WEBHOOK_SECRET
        sync: false # From Clerk Dashboard -> Webhooks
      
      # OpenAI / Gemini API Key
      - key: OPENAI_API_KEY
        sync: false

      # Social Media APIs (Add these as needed)
      - key: X_CLIENT_ID
        sync: false
      - key: X_CLIENT_SECRET
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: INSTAGRAM_CLIENT_ID
        sync: false
      - key: INSTAGRAM_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_CLIENT_ID
        sync: false
      - key: FACEBOOK_CLIENT_SECRET
        sync: false

  # 2. Redis (Key Value Store for BullMQ)
  - type: keyvalue
    name: socialflow-cache
    plan: free
    ipAllowList: [] # Allow all internal traffic
