services:
  # 1. Consolidated App (Backend serving Frontend)
  - type: web
    name: socialflow-saas
    runtime: node
    plan: free
    # Build frontend first, then backend
    buildCommand: npm install && npm run build && cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: socialflow-cache
          property: connectionString
      # Social API Keys (To be filled in Render UI)
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        value: us-east-1
      # OpenAI / Gemini API Key
      - key: OPENAI_API_KEY
        sync: false

  # 2. Redis (Key Value Store for BullMQ)
  - type: keyvalue
    name: socialflow-cache
    plan: free
    ipAllowList: [] # Allow all internal traffic
